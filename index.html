<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucia Tomita - Psicóloga Clínica</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #e2e2e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: "Poppins", sans-serif;
            color: #116A63;
        }

        /* ── TELA DE CARREGAMENTO ── */
        #loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            transition: opacity .4s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(17, 106, 99, 0.2);
            border-top-color: #116A63;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #loading p {
            font-size: 13px;
            opacity: 0.6;
            font-weight: 400;
        }

        /* ── TELA DE ESCOLHA (fallback) ── */
        #choose {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            text-align: center;
            padding: 0 24px;
            animation: fadeIn .5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        #choose h1 {
            font-size: clamp(14px, 3vw, 17px);
            font-weight: 500;
            color: #555;
            max-width: 420px;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 26px;
            border: none;
            border-radius: 50px;
            font-family: "Poppins", sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: transform .2s ease, box-shadow .2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,.15);
        }

        .btn-br {
            background-color: #116A63;
            color: #fff;
        }

        .btn-jp {
            background-color: #ffffff;
            color: #116A63;
            border: 2px solid #116A63;
        }

        .btn span.flag { font-size: 20px; line-height: 1; }
    </style>
</head>
<body>

    <!-- Estado: detectando localização -->
    <div id="loading">
        <div class="spinner"></div>
        <p>Carregando...</p>
    </div>

    <!-- Estado: escolha manual (mostrado se API falhar OU após timeout) -->
    <div id="choose">
        <h1>Selecione a versão do site que deseja acessar:</h1>
        <div class="btn-group">
            <a href="indexBR.html" class="btn btn-br">
                <span class="flag">🇧🇷</span> Versão Brasil
            </a>
            <a href="indexJP.html" class="btn btn-jp">
                <span class="flag">🇯🇵</span> Versão Japão
            </a>
        </div>
    </div>

    <script src="version.js"></script>
    <script>
        SiteVersion.init(function (v) {
            window.location.replace(v === 'JP' ? 'indexJP.html' : 'indexBR.html');
        });
    </script>
</body>
</html>
